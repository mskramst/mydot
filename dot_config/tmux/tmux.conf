# ============================================================================
# 1. CORE SYSTEM PREFIX & SHORTCUTS
# ============================================================================
# Unbind default Ctrl+b and set it to Ctrl+a (matches screen layout)
unbind C-a
set -g prefix C-a

# Fast toggle back to the last active window
bind-key L last-window
bind-key C-a last-window

# Fast configuration reloading sequence
bind -r r source-file ~/.config/tmux/.tmux.conf

# ============================================================================
# 2. ENVIRONMENT & SHELL OPTIONS
# ============================================================================
# Set default shell wrapper shell to Zsh
set-option -g default-command zsh

# Performance buffers and escape timing adjustments
set-option -g history-limit 5000
set -g focus-events on
set -g repeat-time 200
set -g escape-time 50

# Native mouse integration controls (scrolling/clicking)
set -g mouse on

# ============================================================================
# 3. TERMINAL COLOR ENGINES (24-Bit TrueColor Bridge)
# ============================================================================
# Advertise 256-color capabilities to the host OS
set -g default-terminal "tmux-256color"

# Force modern 24-bit TrueColor pass-through to avoid broken Neovim colors
set -as terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Tc"

# ============================================================================
# 4. WINDOWS & PANES MANAGEMENT
# ============================================================================
# Start window and pane indexing rules at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Window spawning overrides
unbind n
bind n new-window

# Intuitive pane split key combinations
unbind |
bind | split-window -h
bind \\ split-window -h
bind 'C-\' split-window -h

unbind -
bind - split-window -v -p 50
unbind _
bind _ split-window -v -p 50

# Vim-style directional navigation rules for active panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Precision pane dimension resizing rules
bind -r C-k resize-pane -U 4
bind -r C-j resize-pane -D 4
bind -r C-h resize-pane -L 4
bind -r C-l resize-pane -R 4

# ============================================================================
# 5. COPY-MODE INTERFACES (Vim-Bindings & Clipboard Sync)
# ============================================================================
# Force vi keys inside copy mode and command prompt pipelines
setw -g mode-keys vi
set -g status-keys vi

# Copy and clipboard hand-off sequences
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy" \; display-message "Copied to clipboard!"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy" \; display-message "Copied to clipboard!"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe "sed 's/^  //' | clip.exe" \; display-message "Copied Codex block"

# Selection engine block highlight accent coloring
set -g mode-style "bg=#6ED9FF,fg=black"

# ============================================================================
# 6. UI INTERFACES & COSMETIC STYLING
# ============================================================================
# Split divider thin line style parameters
set -g pane-border-style "fg=cyan"
set -g pane-active-border-style "fg=cyan"

# Clock mode overlay configurations
set -g clock-mode-style 12
setw -g clock-mode-colour blue

# Status line positioning layout rules
unbind s
bind s set-option status
set-option -g status-position top
set -g status-justify left
set -g status-interval 1

# Status line color palettes
set -g status-bg yellow
set -g status-fg black 
set -g message-style "fg=cyan"

# Text outputs for left/right positions
set -g status-left ""
set -g status-right "#[fg=black] %m-%d-%Y %I:%M Learn_something_new "

# GLOBAL ACCENT FORCE: Keep status bar off permanently by default
set -g status off
